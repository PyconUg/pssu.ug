{% extends "base.html" %}

{% block content %}
<div class="max-w-7xl mx-auto px-6 py-16">
  <div class="text-center mb-12">
    <h1 class="text-4xl font-semibold text-slate-900 mb-4">Events</h1>
    <p class="text-lg text-slate-600 max-w-2xl mx-auto">
      Co-events running alongside PyCon Africa 2026: workshops, community programmes, and more.
    </p>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
    {% for event in co_events %}
    <div class="bg-white rounded-xl border border-slate-200 shadow-sm p-8 flex flex-col">
      <h2 class="text-xl font-semibold text-slate-900 mb-3">{{ event.name }}</h2>
      <p class="text-slate-600 leading-relaxed flex-1">{{ event.description }}</p>
      <div class="mt-6">
        <a href="{% url event.url_name %}"
           class="inline-block px-5 py-2 text-sm font-semibold text-white bg-cyan-600 hover:bg-cyan-700 rounded-lg transition-colors">
          Learn more
        </a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>
{% endblock %}
