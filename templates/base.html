<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Python Software Society of Uganda</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'vendor/main.css' %}" />
</head>
<body class="bg-slate-50 text-slate-900">
    <header class="bg-white shadow-sm">
        <div class="mx-auto max-w-7xl px-6 py-5 flex items-center justify-between">
            <a href="/" class="text-xl font-semibold text-slate-900 no-underline hover:no-underline">PSSU</a>
            <nav class="flex items-center gap-6">
                <a href="#about" class="text-slate-600 hover:text-slate-900 no-underline text-sm font-medium">About</a>

                <!-- Regional apply dropdown -->
                <div class="relative group">
                    <button class="flex items-center gap-1 text-slate-600 hover:text-slate-900 text-sm font-medium cursor-pointer bg-transparent border-none p-0">
                        Apply
                        <svg class="w-4 h-4 transition-transform group-hover:rotate-180" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="absolute right-0 top-full mt-2 w-44 bg-white rounded-xl shadow-lg border border-slate-100 py-1 invisible opacity-0 group-hover:visible group-hover:opacity-100 transition-all duration-150 z-50">
                        <a href="{% url 'apply' 'rwanda' %}" class="block px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-slate-900 no-underline">
                            🇷🇼 Rwanda
                        </a>
                        <a href="{% url 'apply' 'kenya' %}" class="block px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-slate-900 no-underline">
                            🇰🇪 Kenya
                        </a>
                        <a href="{% url 'apply' 'tanzania' %}" class="block px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 hover:text-slate-900 no-underline">
                            🇹🇿 Tanzania
                        </a>
                    </div>
                </div>
            <a href="/" class="text-xl font-semibold text-slate-900">PSSU</a>
            <nav class="space-x-4">
                <a href="#about" class="text-slate-600 hover:text-slate-900">About</a>
                <a href="/events/" class="text-slate-600 hover:text-slate-900">Events</a>
            </nav>
        </div>
    </header>
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
